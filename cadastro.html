<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <div class="fundoLoginCadastro">
    <div class="containerLoginCadastro">
        <h1>Criar Conta</h1>
        <input type="text" id="input_nome" placeholder="*Digite seu nome">
        <div id="erro_nome"></div>
        <input type="text" id="input_cpf" placeholder="*Digite seu CPF - sem pontos e traĂ§os">
        <div id="erro_cpf"></div>
        <input type="text" id="input_email" placeholder="*Digite seu email - example@hotmail.com">
        <div id="erro_email"></div>
        <input type="password" id="input_senha" placeholder="*Digite sua senha">
        <div id="erro_senha"></div>
        <input type="password" id="input_confirmar_senha" placeholder="*Confirme sua senha">
        <div id="erro_confirmar_senha"></div>
        <button onclick="cadastrar()">Continuar</button>
        <span>JĂ¡ possui conta? <a href="login.html">Clique Aqui para fazer o login</a></span>
    </div>
    </div>

    <footer>
        <div class="footer">
            <a>Uma Homenagem para Lionel Messi - O melhor jogador da HistĂ³ria - "THE GOAT"</a>

    </footer>
</body>
</html>
<script>
    function cadastrar(){
let numeros = ['1','2','3','4','5','6','7','8','9','0'];
let caracteresInvalidosNome = ['1', '2', '3', '4', '5', '6', '7', '8', '9', '0','@','-','_','=','-','+',',','.','{}','#','%','*','/','|','[]','()',';','?','Âº','Âª'];
let nome =   input_nome.value;
let cpf =   input_cpf.value;
let email =   input_email.value;
let senha =   input_senha.value;
let confirmarSenha =   input_confirmar_senha.value;
 let invalido = 0;
        let cpfInvalido = 0;

  //validaĂ§Ă£o nome
        if (nome !== '') {
            for (let i = 0; i < nome.length; i++) {
                if (caracteresInvalidosNome.includes(nome[i])) {
                    invalido++;
                    erro_nome.innerHTML = `* Nome invĂ¡lido`
                } else {
                    erro_nome.innerHTML = '';
                }
            }
        } else {
            erro_nome.innerHTML = `* Nome invĂ¡lido`
        }
        //validaĂ§Ă£o cpf
        if (cpf.length == 11) {
            for (let i = 0; i < cpf.length; i++) {
                    if (!numeros.includes(cpf[i])) {
                    cpfInvalido++
                }
            }
            if (cpfInvalido > 0) {
                erro_cpf.innerHTML = `* CPF invĂ¡lido`;
                invalido++
            } else {
                erro_cpf.innerHTML = '';
            }

        } else if (cpf.length !== 11) {
            erro_cpf.innerHTML = `* CPF invĂ¡lido`;
            invalido++
        } else {
            erro_cpf.innerHTML = '';
        }
        //validaĂ§Ă£o email
        if (!email.endsWith('.com') || !email.includes('@')) {
            erro_email.innerHTML = `* Email invĂ¡lido`;
            invalido++
        } else {
            erro_email.innerHTML = '';
        }
        //validaĂ§Ă£o senha
        if (senha !== '' || confirmarSenha !== '') {
            if (senha != confirmarSenha) {
                erro_confirmar_senha.innerHTML = `* Senhas nĂ£o conferem`;
                invalido++
            } else {
                erro_senha.innerHTML = '';
            }
        } else {
            erro_senha.innerHTML = `* Senha InvĂ¡lida`;
        }
        if (invalido > 0) {
            alert('Cadastro nĂ£o Realizado, Tente Novamente');
        } else {
            alert('Cadastro Realizado com sucesso');
            setTimeout((cadastro) => {
                window.location.replace("login.html");
            }, 750);


        }
    }


    
</script>
