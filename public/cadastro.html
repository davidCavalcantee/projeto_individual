<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/sessao.js"></script>
    <title>Document</title>
</head>

<body>
    <header>
        <img src="assets/icones/logoMessi.png">

        <div class="menu">
            <li><a href="">Quiz</a></li>
            <li><a href="index.html">Home</a></li>
        </div>
    </header>
    <div class="fundoLoginCadastro">
        <div class="containerLoginCadastro">
            <h1>Criar Conta</h1>
            <input type="text" id="input_nome" placeholder="*Digite seu nome">
            <div id="erro_nome"></div>
            <input type="text" id="input_cpf" placeholder="*Digite seu CPF - sem pontos e traços">
            <div id="erro_cpf"></div>
            <input type="text" id="input_email" placeholder="*Digite seu email - example@hotmail.com">
            <div id="erro_email"></div>
            <input type="password" id="input_senha" placeholder="*Digite sua senha">
            <div id="erro_senha"></div>
            <input type="password" id="input_confirmar_senha" placeholder="*Confirme sua senha">
            <div id="erro_confirmar_senha"></div>
            <button onclick="cadastrar()">Continuar</button>
            <span>Já possui conta? <a href="login.html">Clique Aqui para fazer o login</a></span>
        </div>
    </div>
    <div id="mensagem_erro"></div>

    <footer>
        <div class="footer">
            <a>Uma Homenagem para Lionel Messi - O melhor jogador da História - "THE GOAT"</a>
            <span> © 2026 - David Lima Cavalcante</span>
        </div>
    </footer>
</body>

</html>
<script>
    function cadastrar() {
        let numeros = ['1', '2', '3', '4', '5', '6', '7', '8', '9', '0'];
        let caracteresInvalidosNome = ['1', '2', '3', '4', '5', '6', '7', '8', '9', '0', '@', '-', '_', '=', '-', '+', ',', '.', '{}', '#', '%', '*', '/', '|', '[]', '()', ';', '?', 'º', 'ª'];
        let nome = input_nome.value;
        let cpf = input_cpf.value;
        let email = input_email.value;
        let senha = input_senha.value;
        let confirmarSenha = input_confirmar_senha.value;
        let invalido = 0;
        let cpfInvalido = 0;

        //validação nome
        if (nome !== '') {
            for (let i = 0; i < nome.length; i++) {
                if (caracteresInvalidosNome.includes(nome[i])) {
                    invalido++;
                    erro_nome.innerHTML = `* Nome inválido`
                } else {
                    erro_nome.innerHTML = '';
                }
            }
        } else {
            erro_nome.innerHTML = `* Nome inválido`
        }
        //validação cpf
        if (cpf.length == 11) {
            for (let i = 0; i < cpf.length; i++) {
                if (!numeros.includes(cpf[i])) {
                    cpfInvalido++
                }
            }
            if (cpfInvalido > 0) {
                erro_cpf.innerHTML = `* CPF inválido`;
                invalido++
            } else {
                erro_cpf.innerHTML = '';
            }

        } else if (cpf.length !== 11) {
            erro_cpf.innerHTML = `* CPF inválido`;
            invalido++
        } else {
            erro_cpf.innerHTML = '';
        }
        //validação email
        if (!email.endsWith('.com') || !email.includes('@')) {
            erro_email.innerHTML = `* Email inválido`;
            invalido++
        } else {
            erro_email.innerHTML = '';
        }
        //validação senha
        if (senha !== '' || confirmarSenha !== '') {
            if (senha != confirmarSenha) {
                erro_confirmar_senha.innerHTML = `* Senhas não conferem`;
                invalido++
            } else {
                erro_senha.innerHTML = '';
            }
        } else {
            erro_senha.innerHTML = `* Senha Inválida`;
        }

        if(invalido == 0){
            alert('Cadastro Realizado com sucesso')
            fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nome,
        emailServer: email,
        senhaServer: senha,
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
        //   cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "750");

        //   limparFormulario();
        //   finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
    
    }else{
        alert(`Cadastro não realizado, Tente novamente ${invalido}`)
        }
    
    
    }


</script>
